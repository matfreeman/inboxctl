changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - enhancement
    - title: Fixes
      labels:
        - bug
    - title: Docs
      labels:
        - documentation
    - title: Maintenance
      labels:
        - chore
        - ci
        - dependencies
        - refactor
